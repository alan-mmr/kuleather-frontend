<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Produk Saya — Kuleather Seller</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/typography.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/seller.css">
</head>
<body>

  <div class="admin-wrapper">
    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <a class="admin-sidebar-logo" href="../index.html" id="seller-shop-logo-text">KULEATHER</a>
        <button class="admin-sidebar-toggle" aria-label="Toggle Sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
      </div>
      <nav class="admin-sidebar-nav">
        <a href="dashboard.html" class="admin-nav-item">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
          <span>Dashboard</span>
        </a>
        <a href="products.html" class="admin-nav-item active">
          <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
          <span>Produk Saya</span>
        </a>
        <a href="orders.html" class="admin-nav-item">
          <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          <span>Pesanan Masuk</span>
          <span class="nav-badge" id="seller-sidebar-orders-badge" style="display: none;">0</span>
        </a>
        <a href="services.html" class="admin-nav-item">
          <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
          <span>Jasa Saya</span>
        </a>
        <a href="finance.html" class="admin-nav-item">
          <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
          <span>Keuangan</span>
        </a>
        <a href="store.html" class="admin-nav-item">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          <span>Toko Saya</span>
        </a>
      </nav>
      <div class="admin-sidebar-footer">
        <div class="admin-user-avatar" id="seller-sidebar-avatar">TS</div>
        <div class="admin-user-info">
          <span class="admin-user-name" id="seller-sidebar-name">Nama Pemilik</span>
          <span class="admin-user-role" id="seller-sidebar-role">Toko Kulit</span>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTAINER -->
    <div class="admin-main">
      <!-- TOP BAR -->
      <header class="admin-topbar">
        <div class="admin-breadcrumb">
          <a href="dashboard.html">MITRA SELLER</a>
          <span class="separator">/</span>
          <span class="current">Produk Saya</span>
        </div>
        <div class="admin-topbar-actions">
          <div id="seller-theme-toggle"></div>
          <span class="admin-datetime" id="seller-datetime-display">Sabtu, 13 Juni 2026</span>
          <a href="#" class="admin-topbar-btn" id="seller-topbar-shop-name" style="font-family: var(--font-mono); font-weight: bold; font-size: 0.75rem;">TOKO SAYA</a>
          <button onclick="handleSellerLogout()" class="admin-topbar-btn" aria-label="Log Out" title="Log Out">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </button>
        </div>
      </header>

      <!-- CONTENT -->
      <main class="admin-content">
        <!-- PAGE HEADER -->
        <div class="admin-page-header">
          <div class="admin-page-title-area">
            <span class="admin-page-subtitle">SINKRONISASI PRODUK MARKETPLACE</span>
            <h1 class="admin-page-title">
              Kelola Produk Saya
              <span class="admin-page-title-count" id="product-total-count">0</span>
            </h1>
          </div>
          <div class="admin-page-actions">
            <button class="btn-admin btn-admin-primary" onclick="openProductAddModal()">
              <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              Tambah Produk
            </button>
          </div>
        </div>

        <!-- FILTER BAR -->
        <div class="admin-filter-bar">
          <!-- Search input -->
          <div class="admin-search-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="product-search-input" class="admin-input-search" placeholder="Cari nama produk...">
          </div>

          <!-- Category filter -->
          <select id="filter-category-select" class="admin-filter-select">
            <option value="Semua">Semua Kategori</option>
            <option value="Finished Leather Goods">Finished Leather Goods</option>
            <option value="Raw Materials">Raw Materials</option>
            <option value="Leather Chemicals">Leather Chemicals</option>
            <option value="Machinery & Tools">Machinery & Tools</option>
          </select>

          <!-- Status filter -->
          <select id="filter-status-select" class="admin-filter-select">
            <option value="Semua">Semua Status</option>
            <option value="active">Aktif (Published)</option>
            <option value="inactive">Nonaktif</option>
            <option value="pending_review">Menunggu Review</option>
          </select>

          <!-- Stock filter -->
          <select id="filter-stock-select" class="admin-filter-select">
            <option value="Semua">Semua Tingkat Stok</option>
            <option value="tersedia">Tersedia (>15)</option>
            <option value="rendah">Rendah (1-15)</option>
            <option value="habis">Habis (0)</option>
          </select>
        </div>

        <!-- PRODUCTS TABLE -->
        <div class="admin-table-wrapper">
          <table class="admin-table">
            <thead>
              <tr>
                <th style="width: 60px;">Foto</th>
                <th>Nama Produk</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Terjual</th>
                <th>Status</th>
                <th style="width: 120px; text-align: right;">Aksi</th>
              </tr>
            </thead>
            <tbody id="products-table-tbody">
              <!-- Rendered via JS -->
            </tbody>
          </table>
        </div>

        <!-- PAGINATION -->
        <div class="admin-pagination" id="products-pagination">
          <!-- Rendered via JS -->
        </div>

      </main>
    </div>
  </div>

  <!-- CRUD MODAL -->
  <div class="admin-modal-overlay" id="product-modal-overlay">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h2 class="admin-modal-title" id="product-modal-title">Tambah Produk</h2>
        <button class="admin-modal-close" onclick="closeModal('product-modal-overlay')">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <form id="product-crud-form">
        <input type="hidden" id="product-id-field">
        <div class="admin-modal-body">
          
          <div class="admin-form-group">
            <label class="admin-form-label">Nama Produk</label>
            <input type="text" id="product-name" class="admin-form-input" placeholder="Masukkan nama lengkap produk..." required>
          </div>

          <div class="admin-form-group row-2">
            <div>
              <label class="admin-form-label">Kode SKU (Otomatis)</label>
              <input type="text" id="product-sku" class="admin-form-input" placeholder="Otomatis" readonly>
            </div>
            <div>
              <label class="admin-form-label">Kategori</label>
              <select id="product-category" class="admin-form-select" required>
                <option value="Finished Leather Goods">Finished Leather Goods</option>
                <option value="Raw Materials">Raw Materials</option>
                <option value="Leather Chemicals">Leather Chemicals</option>
                <option value="Machinery & Tools">Machinery & Tools</option>
              </select>
            </div>
          </div>

          <div class="admin-form-group row-2">
            <div>
              <label class="admin-form-label">Harga (Rupiah)</label>
              <input type="number" id="product-price" class="admin-form-input" placeholder="Contoh: 1250000" min="0" required>
            </div>
            <div>
              <label class="admin-form-label">Stok Fisik</label>
              <input type="number" id="product-stock" class="admin-form-input" placeholder="Contoh: 25" min="0" required>
            </div>
          </div>

          <div class="admin-form-group row-2">
            <div>
              <label class="admin-form-label">Bahan Baku Utama</label>
              <select id="product-material" class="admin-form-select" required>
                <option value="Kulit Sapi Asli">Kulit Sapi Asli</option>
                <option value="Kulit Domba Premium">Kulit Domba Premium</option>
                <option value="Kulit Kambing">Kulit Kambing</option>
                <option value="Exotic Leather (crocodile/phyton)">Exotic Leather (crocodile/phyton)</option>
                <option value="Bahan Penyamak Kimia">Bahan Penyamak Kimia</option>
                <option value="Baja & Kayu (Tools)">Baja & Kayu (Tools)</option>
              </select>
            </div>
            <div>
              <label class="admin-form-label">Asal Kerajinan / Kota</label>
              <input type="text" id="product-origin" class="admin-form-input" placeholder="Contoh: Magetan, Jawa Timur" required>
            </div>
          </div>

          <div class="admin-form-group row-2">
            <div>
              <label class="admin-form-label">Status Penjualan</label>
              <select id="product-status" class="admin-form-select" required>
                <option value="active">Aktif (Published)</option>
                <option value="inactive">Nonaktif (Archived)</option>
              </select>
            </div>
            <div>
              <label class="admin-form-label">Pilih Foto Produk</label>
              <select id="product-photo" class="admin-form-select" required>
                <option value="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500&q=80">Tas Kulit Handbag Classic</option>
                <option value="https://images.unsplash.com/photo-1547949003-9792a18a2601?w=500&q=80">Tas Kulit Ransel Backpack</option>
                <option value="https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=500&q=80">Sepatu Leather Derby Brown</option>
                <option value="https://images.unsplash.com/photo-1624222247344-550fb8ecf7db?w=500&q=80">Jaket Kulit Biker Black</option>
                <option value="https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?w=500&q=80">Dompet Kulit Trifold Minimalist</option>
                <option value="https://images.unsplash.com/photo-1563227812-0ea4c22e6cc8?w=500&q=80">Kulit Sapi Samak Nabati</option>
                <option value="https://images.unsplash.com/photo-1594913785162-e678ba212e5c?w=500&q=80">Alat Pahat Leathercraft Kit</option>
              </select>
            </div>
          </div>

          <div class="admin-form-group">
            <label class="admin-form-label">Deskripsi Lengkap Produk</label>
            <textarea id="product-description" class="admin-form-textarea" placeholder="Tuliskan spesifikasi lengkap, garansi, opsi ukuran, warna..." required rows="4"></textarea>
          </div>

        </div>
        <div class="admin-modal-footer">
          <button type="button" class="btn-admin btn-admin-secondary" onclick="closeModal('product-modal-overlay')">Batal</button>
          <button type="submit" class="btn-admin btn-admin-primary" id="product-submit-btn">Simpan Produk</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/seller-core.js"></script>
  <script src="../js/seller-products.js"></script>
</body>
</html>
